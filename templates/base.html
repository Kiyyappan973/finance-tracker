<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finance Tracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="/">Finance Tracker</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav">
                <a class="nav-link text-white" href="/">Home</a>
                <a class="nav-link text-white" href="/income">Income</a>
                <a class="nav-link text-white" href="/expenses">Expenses</a>
                <a class="nav-link text-white" href="/goal_planner">Goal Planner</a>
                <a class="nav-link text-white" href="/dashboard">Dashboard</a>
                <a class="nav-link text-white" href="/insurance">Insurance</a>
                <a class="nav-link text-white" href="/advice">Advice</a>

                {% if session.username %}
                    <span class="nav-link text-warning">Hi, {{ session.username }}</span>
                    <a class="nav-link text-white" href="/logout">Logout</a>
                {% else %}
                    <a class="nav-link text-white" href="/login">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
